	<script type="text/javascript">
		capturecenter={x:300,y:300};
		xpcallback=false;
		xpcountercallback=false;
		currenttooltip="";
		
		//This object is used to set the config for this app
		var exampleconfig={
			appName:"Timers",
			description:"Create various countdown timers.",
			appUrl:"https://chisel.weirdgloop.org/gazproj/alt1/timers/",//app startup url relative to current domain
			configUrl:"https://chisel.weirdgloop.org/gazproj/alt1/timers/timerconfig.json",//link to a json file which contains this object, this link uniquely identifies your app
			defaultWidth:300,//preferred sizes, can be overwritten by alt1

			//{handlerName:"player",handlerUrl:"/myUrl/?player=%s",handlerScript:"setPlayer('%s');"}
			requestHandlers:[],
			
			activators: [],

			permissions:"overlay" //overlay includes tooltip
		};
		
		//reference the appconfig.json file as config, this file can also be referenced in an alt1 link in any browser
		//clicking this link in any browser will start alt1 and show an add app dialog
		//<a href="alt1:addapp:http://runeapps.org/apps/alt1/example/appconfig.json">Add example app</a>
		//only supported in alt1 1.1+
		if(window.alt1 && alt1.versionint>1001000){alt1.identifyAppUrl("timerconfig.json");}
		
		//i'm crippled without this function
		function elid(id){return document.getElementById(id);}
		
		//this function will be called when the user presses alt1 over anything
		function alt1onrightclick(obj){
        }

        function Timer(_id) {
            var self = this;
            this.id = _id;
            this.isPaused = true;
            this.isTicks = false;
            this.duration = 60; //1 minute default
            this.left = 60;
            this.endAt = (new Date()).getTime()/1000 + self.left;
            this.audio = new Audio('https://runeapps.org/apps/alt1/afkscape/sounds/bell.wav');
            this.label = 'timer ' + _id;

            function makeTimer() {
                self.$div = $('<div class="timer">').attr('id', 'timer-'+self.id);
                self.$label = $('<div class="timer-label">').text(self.label);
                self.$time = $('<div class="timer-time">');
                self.$controls = $('<div class="timer-controls">');
                self.$control_playpause = $('<div class="button timer-controls-playpause">').text('Start');
                self.$control_edit = $('<div class="button timer-controls-edit">').text('Edit');
                self.$control_reset = $('<div class="button timer-controls-reset">').text('Reset');
                self.$control_delete = $('<div class="button timer-controls-delete">').text('Delete');
                self.$controls.append(self.$control_playpause, self.$control_edit, self.$control_reset, self.$control_delete);
                self.$div.append(self.$label, self.$time, self.$controls);

                self.$control_playpause.click(function(){
                    if (self.done()) {
                        self.left = self.duration;
                        unpause();
                        return;
                    }
                    if (self.isPaused) {
                        unpause();
                    } else {
                        window.clearInterval(self.interval);
                        self.$time.addClass('timer-paused');
                        self.$control_playpause.text('Unpause');
                    }
                    self.isPaused = !self.isPaused;
                });
                self.$control_reset.click(function(){
                    if (self.done()) {
                        self.left = self.duration;
                        unpause();
                        return;
                    }
                    self.endAt = (new Date()).getTime()/1000 + self.duration;
                    updateTimer(); // force a redraw right away
                });
                self.$control_delete.click(function(){
                    window.clearInterval(self.interval);
                    self.$div.remove();
                });

                self.$control_edit.click(editTimer);
            }

            function unpause() {
                self.$control_playpause.text('Pause');
                self.endAt = (new Date()).getTime()/1000 + self.left;
                self.interval = window.setInterval(updateTimer, 100);
                self.$time.removeClass('timer-paused');
            }

            function editTimer() {
                var editBox = window.open('', 'edittimerprompt', 'width=350,height=300');
                var editBoxDoc = editBox.document;
                editBoxDoc.write('<!DOCTYPE html><head>'+
                    '<script>if (typeof(jQuery) == "undefined") { window.jQuery = function(selector){ return window.opener.jQuery(selector, document); }; jQuery = window.opener.$.extend(jQuery, window.opener.$); window.$ = jQuery; } <'+'/script></head>'+
                '<body><div id="timer-label-cont"><label for="timer-label">Timer label</label> <input type="text" id="timer-label" name="timer-label"></div>'+
                    '<div id="type-radio" class="type-radio">'+
                    '<div><input type="radio" id="seconds-radio" name="time-radio" value="hms"><label for="seconds-radio">hours, minutes, seconds</label></div>'+
                    '<div><input type="radio" id="ticks-radio" name="time-radio" value="tick"><label for="ticks-radio">game ticks</label></div>'+
                '</div><div id="duration-input" class="duration-input">'+
                    '<div class="duration-hms">Timer duration (HH:MM:SS) <input type="number" title="hours" id="duration-hour" name="duration-hour" min="0" step="1" placeholder="HH"> : <input type="number" title="minutes" id="duration-minute" name="duration-minute" min="0" max="59" step="1" placeholder="MM"> : <input type="number" title="seconds" id="duration-second" name="duration-second" min="0" max="59" step="1" placeholder="SS"></div>'+
                    '<div class="duration-tick">Timer duration (ticks) <input type="number" title="game ticks" id="duration-tick" name="duration-tick" min="0" step="1" placeholder="game ticks"></div>'+
                '</div><div class="buttons">'+
                    '<input type="button" id="confirm" name="confirm" value="Confirm"> <input type="button" id="close" name="close" value="Cancel">'+
                '</div></body>');
                
                function $_$(sel) {
                    return $(sel, editBoxDoc);
                }

                $_$('#timer-label').val(self.label);
                if (self.isTicks) {
                    $_$('#type-radio input').val('tick');
                    $_$('#duration-input').attr('data-input-type', 'tick');
                    $_$('#duration-tick').val(self.duration);
                } else {
                    var h,m,s, working;
                    h = Math.floor(self.duration / 3600);
                    working = self.duration - h * 3600;
                    m = Math.floor(working / 60);
                    s = working - m * 60;
                    $_$('#type-radio input').val('hms');
                    $_$('#duration-input').attr('data-input-type', 'hms');
                    $_$('#duration-hour').val(h);
                    $_$('#duration-minute').val(m);
                    $_$('#duration-second').val(s);
                }

                $('input[name="time-radio"]', editBoxDoc).change(function(){
                    $('#duration-input', editBoxDoc).attr('data-input-type', $('input[name="time-radio"]:checked', editBoxDoc).val());
                });

                $('#confirm', editBoxDoc).click(function(){
                    self.label = $_$('#timer-label').val();
                    self.$label.text(self.label);
                    self.isTicks = $_$('#type-radio input:checked').val() === 'tick';
                    if (self.isTicks) {
                        self.duration = parseInt($_$('#duration-tick').val());
                        if (isNaN(self.duration)) {
                            self.duration = 1;
                        }
                    } else {
                        var h,m,s;
                        h = parseInt($_$('#duration-hour').val());
                        m = parseInt($_$('#duration-minute').val());
                        s = parseInt($_$('#duration-second').val());
                        if (isNaN(h)) {
                            h = 0;
                        }
                        if (isNaN(m)) {
                            m = 0;
                        }
                        if (isNaN(s)) {
                            s = 0;
                        }
                        self.duration = h * 3600 + m * 60 + s;
                    }

                    editBox.close();
                });

                $_$('#close').click(function(){
                    editBox.close();
                });

            }

            function updateTimer() {
                var now = (new Date()).getTime()/1000;
                self.left = self.endAt - now;
                if (self.left <= 0) {
                    timerDone();
                    return;
                }
                self.$time.removeClass('timer-done');
                var hrs, mins, secs, str, working;
                hrs = Math.floor(self.left / 3600);
                working = self.left - hrs * 3600;
                mins = Math.floor( working / 60 );
                working = working - mins * 60;
                secs = Math.ceil(working);
                if (secs === 60) {
                    mins++;
                    secs = 0;
                }
                if (mins < 10) {
                    mins = '0'+mins;
                }
                if (secs < 10) {
                    secs = '0'+secs;
                }
                self.$time.text( hrs+':'+mins+':'+secs );
            }

            function timerDone() {
                self.$time.text('Timer done!');
                self.audio.play();
                window.clearInterval(self.interval);
                self.$time.addClass('timer-done');
                self.$control_playpause.text('Restart timer');
                makeTooltip();
            }

            this.done = function() {
                return self.left <= 0;
            };

            makeTimer();
            updateTimer();
        }
        var timers = [], timer_index = 0;
        function createtimer() {
            var timer = new Timer(timer_index);
            timers.push(timer);
            $('#timers').append(timer.$div);
            timer_index++;
        }
        function makeTooltip() {
            var currentTooltip = [];
            for (var i=0; i<timers.length; i++) {
                if (timers[i].done()) {
                    currentTooltip.push(timers[i].label +' done!');
                }
            }
            currentTooltip = currentTooltip.join('\n');
            if (currentTooltip === '') {
                alt1.clearTooltip();
            } else {
                alt1.setTooltip(currentTooltip);
            }

        }
		
		function start(){
			if(window.alt1){
				
				if(alt1.permissionInstalled) {
					console.log(JSON.parse(alt1.openInfo));
				}
				//dump all events onto the console (right-click the settings spanner to view)
				for (var a in alt1.events) {
					alt1.events[a].push(function (e) { console.log(e); });
				}
			}

		}
	</script>
